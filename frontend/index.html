<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Apply persisted theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("neo-theme");
          if (t !== "light" && t !== "dark") t = "dark";
          var el = document.documentElement;
          el.classList.remove("light", "dark");
          el.classList.add(t);
          el.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="Neo Automation Pvt. Ltd. — Premium automation solutions, industrial tools & authorised distributor of Atlas Copco, GESIPA, eepos, GEDORE, PFERD & John Guest."
    />
    <meta name="theme-color" content="#050507" />
    <title>Neo Automation — Engineering Tomorrow's Industry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
